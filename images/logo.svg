    <!-- patas izquierda y derecha -->
    <path d="M-38 0 Q-44 10 -36 14" fill="none" stroke="#f7f5e4" stroke-width="2" stroke-linecap="round" style="fill:none;stroke:rgb(247, 245, 228);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M38 0 Q44 10 36 14" fill="none" stroke="#f7f5e4" stroke-width="2" stroke-linecap="round" style="fill:none;stroke:rgb(247, 245, 228);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

