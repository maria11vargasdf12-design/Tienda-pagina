    <!-- arco superior de la percha -->
    <path d="M0 0 C0 -14 12 -22 22 -16" fill="none" stroke="#f7f5e4" stroke-width="2" stroke-linecap="round" style="fill:none;stroke:rgb(247, 245, 228);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- barra horizontal -->
    <line x1="-38" y1="0" x2="38" y2="0" stroke="#f7f5e4" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(247, 245, 228);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- palo vertical -->
