  <line x1="160" y1="155" x2="285" y2="155" mask="url(#imagine-text-gaps-4uj3t1)" style="fill:rgb(0, 0, 0);stroke:rgb(200, 214, 232);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="395" y1="155" x2="520" y2="155" mask="url(#imagine-text-gaps-4uj3t1)" style="fill:rgb(0, 0, 0);stroke:rgb(200, 214, 232);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Subtítulo -->
  <text x="340" y="178" text-anchor="middle" style="fill:rgb(200, 214, 232);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">MODA &amp; ESTILO</text>
