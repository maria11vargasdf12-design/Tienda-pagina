<svg width="100%" viewBox="0 0 690 230" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Velour - Tienda de ropa</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo con nombre Velour y subtítulo, colores azul grisáceo y crema</desc>

  <defs>
    
  <mask id="imagine-text-gaps-4uj3t1" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="690" height="230" fill="white"/><rect x="131.29063415527344" y="70" width="415.0187683105469" height="85.5999984741211" fill="black" rx="2"/><rect x="232.94375610351562" y="164" width="214.1125030517578" height="18.800000190734863" fill="black" rx="2"/></mask></defs>

  <!-- Fondo -->
  <rect width="680" height="220" rx="4" fill="#869dbb" style="fill:rgb(134, 157, 187);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Icono: percha minimalista -->
